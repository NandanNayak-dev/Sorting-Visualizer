<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorting Visualizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Sorting Visualizer</h1>
        <h2>Bubble - Selection - Insertion - Merge</h2>
    </header>

    <main>
        <div class="controls">
            <div class="control-group">
                <label for="size">Array Size: <span id="size-label">50</span></label>
                <input type="range" id="size" min="10" max="100" value="50">
            </div>
            
            <div class="control-group">
                <label for="speed">Speed (ms): <span id="speed-label">50</span></label>
                <input type="range" id="speed" min="10" max="300" value="50">
            </div>

            <div class="control-group">
                <button id="generate-btn">Generate New Array</button>
            </div>

            <div class="control-group">
                <label for="algorithm">Algorithm:</label>
                <select id="algorithm">
                    <option value="bubble">Bubble Sort</option>
                    <option value="selection">Selection Sort</option>
                    <option value="insertion">Insertion Sort</option>
                    <option value="merge">Merge Sort</option>
                </select>
            </div>

            <div class="control-group">
                <button id="sort-btn">Start Sorting</button>
            </div>
        </div>

        <div id="bars-container"></div>
    </main>

    <script src="script.js"></script>
</body>
</html>
